<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Whole Year Puzzle — Solver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --wood-light:#e9dcc3;
    --wood-mid:#d4be97;
    --wood-dark:#b89b6e;
    --burn:#6b4a2a;
    --ink:#2a2118;
    --paper:#f4ecdb;
    --paper-deep:#ece0c8;
    --free-month:#9a958c;
    --free-day:#54504a;
    --shadow:rgba(60,40,18,.30);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Fraunces',serif;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, #faf3e2 0%, #e7d9bc 55%, #d8c6a0 100%);
    color:var(--ink);
    min-height:100vh;
    padding:32px 18px 60px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1080px;margin:0 auto;}

  header{text-align:center;margin-bottom:26px;}
  .kicker{
    font-family:'Spline Sans Mono',monospace;
    font-size:.72rem;letter-spacing:.34em;text-transform:uppercase;
    color:var(--burn);opacity:.8;margin-bottom:8px;
  }
  h1{
    font-size:clamp(2.1rem,5.5vw,3.4rem);
    font-weight:800;line-height:.98;letter-spacing:-.02em;
    color:var(--ink);
  }
  h1 em{font-style:italic;color:var(--burn);}
  .sub{
    margin-top:10px;font-size:.95rem;font-weight:400;font-style:italic;
    color:#5c4a32;
  }

  .panel{
    background:linear-gradient(160deg,var(--wood-light),var(--wood-mid));
    border:1px solid #c3a878;
    border-radius:14px;
    padding:22px 20px;
    box-shadow:0 18px 38px -20px var(--shadow), inset 0 1px 0 rgba(255,255,255,.4);
  }

  .controls{
    display:flex;flex-wrap:wrap;gap:18px 26px;align-items:flex-end;
    justify-content:center;margin-bottom:26px;
  }
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{
    font-family:'Spline Sans Mono',monospace;
    font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;
    color:var(--burn);
  }
  select,button{
    font-family:'Fraunces',serif;font-size:1rem;
    border-radius:9px;border:1px solid #b69a6c;
    background:var(--paper);color:var(--ink);
    padding:10px 14px;cursor:pointer;
  }
  select{min-width:120px;}
  select:focus,button:focus{outline:2px solid var(--burn);outline-offset:1px;}

  .btn-primary{
    background:linear-gradient(165deg,#7a5532,#4f3519);
    color:#f4ecdb;border-color:#3a2710;font-weight:600;
    padding:11px 22px;letter-spacing:.02em;
    transition:transform .12s ease, box-shadow .12s ease;
    box-shadow:0 6px 14px -6px rgba(40,25,8,.7);
  }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 20px -8px rgba(40,25,8,.7);}
  .btn-primary:active{transform:translateY(0);}

  .toggle{
    display:flex;border:1px solid #b69a6c;border-radius:9px;overflow:hidden;
  }
  .toggle button{
    border:none;border-radius:0;background:var(--paper);
    padding:10px 16px;font-size:.9rem;
  }
  .toggle button.active{background:var(--burn);color:var(--paper);}

  /* ---- board ---- */
  .stage{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .status{
    font-family:'Spline Sans Mono',monospace;font-size:.8rem;
    letter-spacing:.06em;color:var(--burn);min-height:1.1em;text-align:center;
  }
  .tray{
    background:linear-gradient(155deg,var(--paper),var(--paper-deep));
    border-radius:12px;padding:16px;
    box-shadow:inset 0 0 0 3px #cbb78d, inset 0 0 26px rgba(120,90,45,.16),
               0 16px 30px -18px var(--shadow);
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(7,var(--cell));
    grid-template-rows:repeat(7,var(--cell));
    gap:3px;
    --cell:62px;
  }
  @media(max-width:680px){.grid{--cell:42px;}}
  @media(max-width:420px){.grid{--cell:36px;}}
  .cell{
    position:relative;border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    font-size:calc(var(--cell)*.30);
    transition:background .25s ease, color .25s ease, box-shadow .25s ease;
  }
  .cell.void{background:transparent;}
  .cell.empty{
    background:repeating-linear-gradient(45deg,#efe6d0,#efe6d0 6px,#e8ddc2 6px,#e8ddc2 12px);
    color:#9c8961;box-shadow:inset 0 0 0 1px #d8c8a2;
  }
  .cell.label{font-weight:500;}
  .cell.piece{
    color:#fff;font-weight:600;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.32),
               inset 0 -3px 6px rgba(0,0,0,.22);
    font-size:calc(var(--cell)*.26);
  }
  .cell.free-month{
    background:var(--free-month);color:#fff;font-weight:800;
    box-shadow:0 0 0 2px #fff, 0 0 16px rgba(90,85,78,.55);
    z-index:2;
  }
  .cell.free-day{
    background:var(--free-day);color:#fff;font-weight:800;
    box-shadow:0 0 0 2px #fff, 0 0 16px rgba(40,38,34,.6);
    z-index:2;
  }
  .cell .corner{
    position:absolute;font-size:calc(var(--cell)*.20);font-weight:500;
    top:3px;left:5px;opacity:.55;
  }

  /* solution navigation */
  .nav{display:flex;align-items:center;gap:14px;justify-content:center;}
  .nav button{padding:8px 14px;font-size:.95rem;}
  .nav button:disabled{opacity:.35;cursor:not-allowed;}
  .counter{
    font-family:'Spline Sans Mono',monospace;font-size:.85rem;
    color:var(--ink);min-width:140px;text-align:center;
  }

  /* legend */
  .legend{
    display:flex;flex-wrap:wrap;gap:8px 12px;justify-content:center;
    margin-top:6px;
  }
  .chip{
    display:flex;align-items:center;gap:6px;
    font-family:'Spline Sans Mono',monospace;font-size:.7rem;
    color:#4a3a22;
  }
  .swatch{width:14px;height:14px;border-radius:4px;
    box-shadow:inset 0 -2px 4px rgba(0,0,0,.25);}

  .gallery{
    margin-top:22px;display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:14px;
  }
  .mini{
    background:var(--paper);border:1px solid #cbb78d;border-radius:8px;
    padding:8px;cursor:pointer;transition:transform .12s,box-shadow .12s;
  }
  .mini:hover{transform:translateY(-3px);box-shadow:0 10px 18px -10px var(--shadow);}
  .mini.sel{outline:2px solid var(--burn);}
  .mini .mg{
    display:grid;grid-template-columns:repeat(7,1fr);gap:1px;
    aspect-ratio:1/1;
  }
  .mini .mc{border-radius:1.5px;}
  .mini .cap{
    font-family:'Spline Sans Mono',monospace;font-size:.62rem;
    text-align:center;margin-top:5px;color:var(--burn);
  }

  footer{
    text-align:center;margin-top:34px;font-size:.78rem;font-style:italic;
    color:#6b5736;
  }
  .pieces-info{
    margin-top:14px;font-family:'Spline Sans Mono',monospace;
    font-size:.68rem;color:#6b5736;text-align:center;line-height:1.9;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Palmetto Puzzle Works</div>
    <h1>The <em>Whole Year</em> Puzzle</h1>
    <div class="sub">Pick a date — the nine pieces rearrange to leave it uncovered.</div>
  </header>

  <div class="panel">
    <div class="controls">
      <div class="field">
        <label for="month">Month</label>
        <select id="month"></select>
      </div>
      <div class="field">
        <label for="day">Day</label>
        <select id="day"></select>
      </div>
      <div class="field">
        <label>Mode</label>
        <div class="toggle" id="mode">
          <button data-mode="one" class="active">One solution</button>
          <button data-mode="all">All solutions</button>
        </div>
      </div>
      <button class="btn-primary" id="solve">Solve</button>
    </div>

    <div class="stage">
      <div class="status" id="status">Choose a date and press Solve.</div>
      <div class="tray">
        <div class="grid" id="grid"></div>
      </div>
      <div class="nav" id="nav" style="display:none;">
        <button id="prev">‹ Prev</button>
        <span class="counter" id="counter"></span>
        <button id="next">Next ›</button>
      </div>
      <div class="legend" id="legend"></div>
    </div>

    <div class="gallery" id="gallery"></div>
  </div>

  <div class="pieces-info" id="piecesInfo"></div>
  <footer>Built from the puzzle geometry — 43 tray cells, 9 pieces covering 41, leaving the month &amp; day free.</footer>
</div>

<script>
/* ============================================================
   THE WHOLE YEAR PUZZLE — geometry, pieces, and solver
   ============================================================ */

/* ---- Board: 7x7 grid. Each playable cell has a label. ---- */
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS_IN_MONTH = {Jan:31,Feb:29,Mar:31,Apr:30,May:31,Jun:30,Jul:31,Aug:31,Sep:30,Oct:31,Nov:30,Dec:31};

const board = {};      // "r,c" -> label
const labelPos = {};   // label -> [r,c]
function addCell(r,c,label){ board[r+","+c]=label; labelPos[label]=[r,c]; }

for(let c=0;c<6;c++) addCell(0,c,MONTHS[c]);        // Jan..Jun  (col 6 cut)
for(let c=0;c<6;c++) addCell(1,c,MONTHS[6+c]);      // Jul..Dec  (col 6 cut)
let d=1;
for(let r=2;r<6;r++) for(let c=0;c<7;c++) addCell(r,c,String(d++));  // days 1..28
[[2,29],[3,30],[4,31]].forEach(([c,day])=>addCell(6,c,String(day))); // days 29,30,31

const CELLS = Object.keys(board).map(k=>k.split(",").map(Number));

/* ---- The 9 pieces (base orientation, list of [r,c] offsets) ---- */
const PIECES = {
  "L4": [[0,0],[1,0],[2,0],[2,1]],            // L : 3 down, 1 right (4)
  "P":  [[0,0],[0,1],[1,0],[1,1],[2,0]],      // P : 2x2 square + 1 down (5)
  "O":  [[0,0],[0,1],[1,0],[1,1]],            // O : 2x2 square (4)
  "U":  [[0,0],[0,2],[1,0],[1,1],[1,2]],      // C : U-pentomino (5)
  "L5": [[0,0],[0,1],[1,0],[2,0],[3,0]],      // L : 4 up, 1 right (5)
  "N":  [[0,0],[1,0],[1,1],[1,2],[2,2]],      // S : N/Z-pentomino (5)
  "X":  [[0,1],[1,0],[1,1],[1,2],[2,1]],      // cross : X-pentomino (5)
  "T":  [[0,0],[0,1],[0,2],[1,1]],            // T : T-tetromino (4)
  "Z":  [[0,1],[1,0],[1,1],[2,0]],            // z : S/Z-tetromino (4)
};

const PIECE_COLORS = {
  "L4":"#c0392b", // red
  "P":"#2e7d32",  // green
  "O":"#1f6f8f",  // teal
  "U":"#e08a1e",  // amber/orange
  "L5":"#6a3d9a", // purple
  "N":"#1746a2",  // blue
  "X":"#d1477a",  // pink
  "T":"#7a6a1c",  // olive
  "Z":"#8a4b2a"   // brown
};
const PIECE_DESC = {
  "L4":"L (4)", "P":"P (5)", "O":"square (4)",
  "U":"C (5)", "L5":"L (5)", "N":"S (5)",
  "X":"cross (5)", "T":"T (4)", "Z":"z (4)"
};

/* ---- orientation generation: 4 rotations x 2 flips ---- */
function normalize(cells){
  const mr=Math.min(...cells.map(p=>p[0]));
  const mc=Math.min(...cells.map(p=>p[1]));
  return cells.map(p=>[p[0]-mr,p[1]-mc])
              .sort((a,b)=>a[0]-b[0]||a[1]-b[1]);
}
function key(cells){ return cells.map(p=>p[0]+":"+p[1]).join("|"); }
function rot(cells){ return cells.map(p=>[p[1],-p[0]]); }
function flip(cells){ return cells.map(p=>[p[0],-p[1]]); }
function orientations(base){
  const seen=new Set(), out=[];
  let cur=base.map(p=>[...p]);
  for(let f=0;f<2;f++){
    for(let r=0;r<4;r++){
      const n=normalize(cur), k=key(n);
      if(!seen.has(k)){seen.add(k);out.push(n);}
      cur=rot(cur);
    }
    cur=flip(cur);
  }
  return out;
}

/* ---- all placements of every piece on the board ---- */
const ALL_PLACEMENTS = {};
for(const name in PIECES){
  const set=new Set(), list=[];
  for(const orient of orientations(PIECES[name])){
    for(let r0=-1;r0<8;r0++) for(let c0=-1;c0<9;c0++){
      const cells=orient.map(p=>[p[0]+r0,p[1]+c0]);
      if(cells.every(p=>board.hasOwnProperty(p[0]+","+p[1]))){
        const ks=cells.map(p=>p[0]+","+p[1]).sort().join(";");
        if(!set.has(ks)){ set.add(ks); list.push(cells.map(p=>p[0]+","+p[1])); }
      }
    }
  }
  ALL_PLACEMENTS[name]=list;
}

/* ---- solver: exact cover with most-constrained-cell branching ---- */
function solve(monthLabel,dayLabel,findAll,limit){
  const freeCells=new Set([ labelPos[monthLabel].join(","), labelPos[dayLabel].join(",") ]);
  const mustCover=new Set(CELLS.map(p=>p.join(",")).filter(k=>!freeCells.has(k)));

  // candidate placements per piece that avoid the free cells
  const cand={};
  for(const nm in PIECES){
    cand[nm]=ALL_PLACEMENTS[nm].filter(pl=>pl.every(k=>!freeCells.has(k)));
  }
  // cell -> [ {piece, cells, set} ]
  const cellOpts={};
  for(const k of mustCover) cellOpts[k]=[];
  for(const nm in cand){
    for(const pl of cand[nm]){
      const entry={piece:nm,cells:pl,set:new Set(pl)};
      for(const k of pl) if(cellOpts[k]) cellOpts[k].push(entry);
    }
  }

  const solutions=[];
  const used=new Set();
  const covered=new Set();
  const placement={};

  function overlaps(s){ for(const k of s) if(covered.has(k)) return true; return false; }

  function bt(){
    if(solutions.length>=limit) return;
    if(covered.size===mustCover.size){
      const snap={};
      for(const p in placement) snap[p]=placement[p].slice();
      solutions.push(snap);
      return;
    }
    // pick uncovered must-cover cell with fewest options (MRV)
    let bestCell=null,bestList=null,bestN=Infinity;
    for(const k of mustCover){
      if(covered.has(k)) continue;
      const opts=[];
      for(const e of cellOpts[k]){
        if(used.has(e.piece)) continue;
        if(overlaps(e.set)) continue;
        opts.push(e);
        if(opts.length>=bestN) break;
      }
      if(opts.length<bestN){bestN=opts.length;bestCell=k;bestList=opts;}
      if(bestN===0) break;
    }
    if(bestN===0||bestCell===null) return;
    for(const e of bestList){
      used.add(e.piece);placement[e.piece]=e.cells;
      for(const k of e.cells) covered.add(k);
      bt();
      for(const k of e.cells) covered.delete(k);
      delete placement[e.piece];used.delete(e.piece);
      if(!findAll && solutions.length) return;
    }
  }
  bt();
  return solutions;
}

/* ============================================================
   UI
   ============================================================ */
const $=id=>document.getElementById(id);
let mode="one";
let solutions=[];
let solIndex=0;
let currentDate=null;

/* populate selects */
const monthSel=$("month"), daySel=$("day");
MONTHS.forEach(m=>{
  const o=document.createElement("option");o.value=m;o.textContent=m;monthSel.appendChild(o);
});
function refreshDays(){
  const m=monthSel.value;
  const max=DAYS_IN_MONTH[m];
  const prev=Number(daySel.value)||1;
  daySel.innerHTML="";
  for(let i=1;i<=max;i++){
    const o=document.createElement("option");o.value=i;o.textContent=i;daySel.appendChild(o);
  }
  daySel.value=Math.min(prev,max);
}
monthSel.addEventListener("change",refreshDays);

/* default to today's date */
(function(){
  const now=new Date();
  monthSel.value=MONTHS[now.getMonth()];
  refreshDays();
  daySel.value=now.getDate();
})();

/* mode toggle */
$("mode").addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;
  mode=b.dataset.mode;
  [...$("mode").children].forEach(x=>x.classList.toggle("active",x===b));
});

/* map a solution to cell -> piece */
function pieceCellMap(sol){
  const map={};
  if(sol) for(const p in sol) for(const k of sol[p]) map[k]=p;
  return map;
}

/* render the 7x7 board for a solution (or empty board if sol is null) */
function renderBoard(sol){
  const grid=$("grid");
  grid.innerHTML="";
  const map=pieceCellMap(sol);
  const monthLabel=currentDate.month, dayLabel=String(currentDate.day);
  for(let r=0;r<7;r++) for(let c=0;c<7;c++){
    const div=document.createElement("div");
    div.className="cell";
    const k=r+","+c;
    if(!board.hasOwnProperty(k)){
      div.classList.add("void");
    }else{
      const label=board[k];
      if(label===monthLabel){
        div.classList.add("free-month");div.textContent=label;
      }else if(label===dayLabel){
        div.classList.add("free-day");div.textContent=label;
      }else if(map[k]){
        div.classList.add("piece");
        div.style.background=PIECE_COLORS[map[k]];
        const corner=document.createElement("span");
        corner.className="corner";corner.textContent=label;
        div.appendChild(corner);
      }else{
        div.classList.add(sol?"empty":"label");
        if(!sol){div.style.background="var(--paper)";div.style.boxShadow="inset 0 0 0 1px #d8c8a2";}
        div.appendChild(document.createTextNode(label));
      }
    }
    grid.appendChild(div);
  }
}

function renderLegend(){
  const leg=$("legend");leg.innerHTML="";
  const items=[
    ["var(--free-month)","Month — left free"],
    ["var(--free-day)","Day — left free"]
  ];
  for(const [col,txt] of items){
    const chip=document.createElement("div");chip.className="chip";
    chip.innerHTML=`<span class="swatch" style="background:${col}"></span>${txt}`;
    leg.appendChild(chip);
  }
}

/* mini gallery of all solutions */
function renderGallery(){
  const g=$("gallery");g.innerHTML="";
  if(mode!=="all"||solutions.length<=1){return;}
  solutions.forEach((sol,idx)=>{
    const map=pieceCellMap(sol);
    const card=document.createElement("div");
    card.className="mini"+(idx===solIndex?" sel":"");
    const mg=document.createElement("div");mg.className="mg";
    for(let r=0;r<7;r++)for(let c=0;c<7;c++){
      const cell=document.createElement("div");cell.className="mc";
      const k=r+","+c;
      if(!board.hasOwnProperty(k)){cell.style.background="transparent";}
      else{
        const label=board[k];
        if(label===currentDate.month) cell.style.background="var(--free-month)";
        else if(label===String(currentDate.day)) cell.style.background="var(--free-day)";
        else if(map[k]) cell.style.background=PIECE_COLORS[map[k]];
        else cell.style.background="#e8ddc2";
      }
      mg.appendChild(cell);
    }
    const cap=document.createElement("div");cap.className="cap";
    cap.textContent="Solution "+(idx+1);
    card.appendChild(mg);card.appendChild(cap);
    card.addEventListener("click",()=>{solIndex=idx;showCurrent();
      $("grid").scrollIntoView({behavior:"smooth",block:"center"});});
    g.appendChild(card);
  });
}

function showCurrent(){
  if(!solutions.length){ renderBoard(null); return; }
  renderBoard(solutions[solIndex]);
  renderLegend();
  const nav=$("nav");
  if(solutions.length>1){
    nav.style.display="flex";
    $("counter").textContent="Solution "+(solIndex+1)+" of "+solutions.length;
    $("prev").disabled=solIndex===0;
    $("next").disabled=solIndex===solutions.length-1;
  }else{
    nav.style.display="none";
  }
  renderGallery();
}

$("prev").addEventListener("click",()=>{if(solIndex>0){solIndex--;showCurrent();}});
$("next").addEventListener("click",()=>{if(solIndex<solutions.length-1){solIndex++;showCurrent();}});

/* solve button */
$("solve").addEventListener("click",()=>{
  const month=monthSel.value;
  const day=Number(daySel.value);
  currentDate={month,day};
  $("status").textContent="Solving…";
  $("nav").style.display="none";
  $("gallery").innerHTML="";
  $("legend").innerHTML="";
  setTimeout(()=>{
    const t0=performance.now();
    const findAll=mode==="all";
    const limit=findAll?500:1;
    solutions=solve(month,String(day),findAll,limit);
    solIndex=0;
    const ms=Math.round(performance.now()-t0);
    if(!solutions.length){
      $("status").textContent="No solution found for "+month+" "+day+".";
      renderBoard(null);
    }else if(findAll){
      const capped=solutions.length>=limit;
      $("status").textContent=`${month} ${day}: ${solutions.length}${capped?"+":""} solution${solutions.length>1?"s":""} found in ${ms} ms.`;
      showCurrent();
    }else{
      $("status").textContent=`${month} ${day}: solved in ${ms} ms.`;
      showCurrent();
    }
  },30);
});

/* initial empty board + piece reference */
currentDate={month:monthSel.value,day:Number(daySel.value)};
renderBoard(null);

(function(){
  const info=$("piecesInfo");
  const parts=Object.keys(PIECES).map(nm=>
    `<span style="color:${PIECE_COLORS[nm]};font-weight:600">■</span> ${nm} · ${PIECE_DESC[nm]}`
  );
  info.innerHTML="The nine pieces &nbsp;—&nbsp; "+parts.join(" &nbsp; ")+
    "<br>Numbers in parentheses are cell counts; total = 41, leaving 2 cells (month + day) free.";
})();
</script>
</body>
</html>
